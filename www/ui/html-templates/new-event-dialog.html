<template id="new-event-dialog">
<dialog id="new-event-form" popover>
    <close-button></close-button>

    <form method="dialog" onsubmit="newEventUI(this)" class="block">
        <input type="hidden" name="itemid">

        <label for="name">Name: <input id="name" name="name" required></label>
        <p>
            Not all time slots are required. Exact times are also not required.
        </p>

        <div class="grid column">
            <label for="after-timestamp" class="flex column" style="align-items: center;">
                After:
                <input type="datetime-local" name="after" id="after-timestamp" style="width: fit-content">
            </label>

            <label for="timestamp" class="flex column" style="align-items: center;">
                On:
                <input id="timestamp" name="timestamp" type="datetime-local" style="width: fit-content">
            </label>

            <label for="before-timestamp"  class="flex column" style="align-items: center;">
                Before:
                <input type="datetime-local" name="before" id="before-timestamp" style="width: fit-content">
            </label>

            <label class="flex column" style="align-items: center;">
                Timezone:
                <input name="timezone" list="tz-selector">
            </label>
        </div>

        <br>

        <div class="flex j-center">
            <button>Add</button>
        </div>
    </form>
    <br>
</dialog>
</template>
