<template id="display-entry">
<link rel="stylesheet" href="/ui/templates/display-entry.css">
<link rel="stylesheet" href="/css/colors.css">
<link rel="stylesheet" href="/css/general.css">
<link rel="stylesheet" href="/ui/css-styles/rating-styles.css">

<style id="custom-styles">
</style>

<datalist id="recommended-by"></datalist>

<de-template-editor></de-template-editor>

<dialog id="notes-edit-dialog" popover>
    <p class="center">Notes save automatically</p>
    <textarea id="notes-edit-box" rows="10" cols="80"></textarea>

    <close-button></close-button>
</dialog>

<dialog id="buy-sell">
    <form method="dialog" class="flex">
        <button value="Purchased">Buy</button>
        <button value="Sold">Sell</button>

        <button value="view-log">View Transactions</button>
    </form>

    <close-button></close-button>
</dialog>

<item-identification-form-dialog></item-identification-form-dialog>


<dialog id="display-info-object-editor-popup" popover style="width: 80vmin; aspect-ratio: 1 / 1;">
    <div class="flex j-center small-gap">
        <button id="save-object-editor" style="align-self: center; height: fit-content;"
            entry-action="saveobject">💾︎</button>
        <h3 class="center">Object Editor</h3>
    </div>
    <div class="center">
        <select id="current-edited-object">
            <option value="entry">entry info</option>
            <option value="user">user info</option>
            <option value="meta">meta info</option>
            <option value="user-extra">User Extra</option>
            <option value="meta-datapoints">Metadata Datapoints</option>
            <option value="meta-media-dependant">Metadata Media Dependant</option>
            <option value="aio-web">AIO Web entry options</option>
        </select>
    </div>
    <table id="display-info-object-tbl" style="width: 100%;">
        <tr>
            <th style="position: relative;"><button entry-action="newobjectfield" style="position: absolute; left: 0"
                id="new-user-extra-field">+</button> Name</th>
            <th>value</th>
        </tr>
    </table>

    <close-button></close-button>
</dialog>

<dialog id="art-styles-menu">
    <fieldset class="grid row m-0 p-0">
        <legend>Art Styles</legend>
        <label for="is-Anime"><input type="checkbox" id="is-Anime" entry-action="toggleartstyle" entry-action-trigger="change">
            Anime</label>
        <label for="is-Cartoon"><input type="checkbox" id="is-Cartoon" entry-action="toggleartstyle" entry-action-trigger="change">
            Cartoon</label>
        <label for="is-Handdrawn"><input type="checkbox" id="is-Handdrawn" entry-action="toggleartstyle" entry-action-trigger="change">
            Hand drawn</label>
        <label for="is-Digital"><input type="checkbox" id="is-Digital" entry-action="toggleartstyle" entry-action-trigger="change">
            Digitally drawn </label>
        <label for="is-CGI"><input type="checkbox" name="is-CGI" id="is-cgi" entry-action="toggleartstyle" entry-action-trigger="change"> Cgi</label>
        <label for="is-2D"><input type="checkbox" name="is-2D" id="is-2D" entry-action="toggleartstyle" entry-action-trigger="change"> 2D</label>
        <label for="is-3D"><input type="checkbox" name="is-3D" id="is-3D" entry-action="toggleartstyle" entry-action-trigger="change"> 3D</label>
        <label for="is-Liveaction"><input type="checkbox" id="is-Liveaction" entry-action="toggleartstyle" entry-action-trigger="change"> Live action</label>
    </fieldset>

    <close-button></close-button>
</dialog>

<div class="root" id="root">

    <art-styles-dialog></art-styles-dialog>

    <figure class="entry-progress">
        <div id="multiple-progress">
        </div>
    </figure>


    <div class="grid row float right small-gap"
        style="margin-inline: var(--small-gap)">
        <details class="hamburger-menu">
            <summary>Actions</summary>
            <menu aria-label="item interactions" class="m-0" id="item-interaction-menu">
                <!-- this gets filled with de_item_interaction settings -->
            </menu>
        </details>


        <de-cost-calculation-modifiers>
        </de-cost-calculation-modifiers>
    </div>


    <figure class="thumbnail-fig flex column" id="thumbnail-fig">
        <menu aria-label="Display and item settings" class="m-0 p-0" id="menu-bar">

            <div style="
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(2, 1fr)
            ">

                <select id="type-selector" style="min-width: 50px;"
                    toggle-hint="type-hint"
                    entry-action="settype" entry-action-trigger="change"
                    aria-labelledby="type-hint"> </select>
                <span id="type-hint" popover='hint'>Media Type</span>

                <button command="show-modal" commandfor="art-styles-menu">Art Styles</button>

                <select id="format-selector" toggle-hint='format-hint'
                    style="min-width: 12ch;"
                    entry-action="setformat" entry-action-trigger="change"
                    aria-labelledby="format-hint"></select>
                <span id="format-hint" popover='hint'>Media Format</span>

                <div class="flex wrap">
                    <input type="checkbox" placeholder="digitized" entry-action="setdigitization" id="format-digitized"
                        style="aspect-ratio: 1; height: 10px; align-self: center;">
                    <label for="format-digitized"
                        toggle-hint='digitized-hint'
                        style="align-self: center;">Digitized
                        <span popover='hint' id='digitized-hint'>Whether or not the item is a digitized/digital version of the format</span>
                    </label>
                </div>
            </div>

        </menu>

        <input type="file" hidden id="thumbnail-file-upload">

        <button class="styleless-button" entry-action="setthumbnail">
            <img src="" alt="" class="thumbnail" id="thumbnail" fetchpriority="high">
        </button>


        <table class="media-info" id="media-info"></table>

        <input
            put-data="Location"
            put-data-mode="value"
            placeholder="item location"
            onchange="updateLocationUI(getIdFromDisplayElement(this), this.value)"
            oncontextmenu="if(event.ctrlKey) { open(this.value, '_blank'); } else {this.select()} event.preventDefault()">

        <div style="
            text-align: center;
        " class="j-center flex"  id="recommended-bys">
            <button id="create-recommended-by">+</button>
        </div>

        <textarea
            id="style-editor"
            entry-action="save"
            entry-action-trigger="change"
            hidden rows="80" cols="80"
        ></textarea>
    </figure>

    <div id="misc-info" class="flex row wrap j-center">
        <hgroup class="flex column center" style="max-width: 50cqb;">
            <div>
                <span id="on-format"></span>
                <span id="media-type"></span>
                <h1 class="m-0 title center inline" id="main-title"></h1>
                <span id="country-origin"></span>
            </div>
            <h3 class="m-0 center official-native-title" id="official-native-title"></h3>

            <h4 class="m-0" put-data="ReleaseYear" put-data-fallback="" style="align-self: center;"></h4>

            <div style="align-items: center;
                        gap: 1ch;
                        font-size: 0.9em;"
                 class="flex grow wrap j-center">

                <button class="rating styleless-button" id="user-rating"
                    toggle-hint='your-rating-hint'
                    entry-action="setrating">??</button>
                <span id='your-rating-hint' popover='hint'>Your Rating</span>

                <span>(<span class="audience-rating" id="audience-rating"  toggle-hint='audience-rating-hint'>??</span>)</span>
                <span id="audience-rating-hint" popover='hint'>Audience Rating</span>
                <span class="cost" id="cost"></span>
            </div>
        </hgroup>

        <div style=" width: min-content; height: fit-content; flex-grow: 0.5; align-self: center;">
            <p class="m-0 center">
                Viewed
                <button id="view-count" class="view-count center styleless-button" entry-action="setviewcount"
                    put-data="ViewCount"></button>
                Times
                (<button class="styleless-button" id="view-time" entry-action="setviewminutes"></button> hours)
            </p>

            <de-status-menu></de-status-menu>
        </div>

    </div>

    <de-notes></de-notes>

    <div style="
        text-align: center;
    " class="flex wrap">
        <div class="tags" id="tags">
            <button id="create-tag" toggle-hint>+ <span popover='hint'>Add Tag</span></button>
        </div>
    </div>

    <div id="description-and-notes">
        <section>
            <de-description></de-description>
            <div id="genres" style="margin-bottom: var(--very-small-gap);" class="flex wrap"></div>
        </section>

        <section>
            <hr>
            <div class="tables flex column" id="event-table-area">
                <div class="flex j-center">
                    <input type="search" placeholder="filter events" id="user-actions-filter">
                    <button popout-target="user-actions" class="popout">↗</button>
                </div>
                <table class="user-actions" id="user-actions"></table>
            </div>
        </section>
    </div>

    <div id="relationship-display">
        <hr>
        <de-requirements></de-requirements>
        <hr>
        <de-descendants></de-descendants>
        <hr>
        <de-copies></de-copies>
    </div>
</div>

<template id="tag">
    <div>
        <div role="button" class="tag" id="tag-name" tabindex="0">
             <button class="delete" id="delete-tag" entry-action="deletetag">✗</button>
        </div>
    </div>
</template>
</template>
