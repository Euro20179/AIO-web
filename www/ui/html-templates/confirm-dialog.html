
<template id="confirm-dialog">
<dialog id="confirm" style="position: relative; height: max(200px, 20%); width: max(50vw, 500px);">
    <button style="position: absolute; top: 2ch; right: 2ch;">X</button>
    <div class="grid" style="grid-auto-rows: 3fr 1fr; height: 100%;">
        <center>
            <div root style="height: 100%; align-content: center;">
            </div>
        </center>
        <div class="flex row j-center">
            <button id="cancel">Cancel</button>
            <button id="ok">OK</button>
        </div>
    </div>
</dialog>
</template>
