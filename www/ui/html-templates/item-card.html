<template id="item-card">
    <link rel="stylesheet" href="/css/colors.css">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/ui/css-styles/rating-styles.css">
    <style>
        article {
            text-align: center;
            width: fit-content;
        }
        picture {
            display: block;
            min-height: 150px;
            box-shadow: 0px 0px 3px currentColor;
        }
        button:has(h2) {
            display: block;
            margin-block: var(--very-small-gap);
            text-align: center;
            width: 100%;
        }
        h2 {
            max-width: 20ch;
            overflow: clip;
            text-overflow: ellipsis;
            text-wrap: nowrap;
        }
    </style>
    <article>
        <button entry-action="openitem" class="styleless-button">
            <picture><slot name="thumbnail"></slot></picture>
        </button>
        <button entry-action="openitem" class="styleless-button">
            <h2 class="m-0"><slot name="title" put-data="En_Title"></slot></h2>
        </button>
        <p class="m-0">
            <progress></progress>
            <slot name="rating" put-data="UserRating"></slot>
            (<slot name="view-count" put-data="ViewCount"></slot>)
        </p>
    </article>
</template>
