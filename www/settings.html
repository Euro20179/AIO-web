<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings</title>
    <link href="/css/colors.css" rel="stylesheet">
    <link href="/css/general.css" rel="stylesheet">

    <style>
        form label:has(textarea){
            display: flex;
            flex-direction: column;
        }

        #forms {
            display: flex;
            flex-direction: column;
            gap: 3cap;
        }

        #notifications {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--main);
            padding: 2em;

            .notification {
                border: 1px solid;
                padding: 3em;
                background: var(--main);
            }

            &:not(:has(.notification)){
                h4 {
                    display: none;
                }
                display: none;
            }
        }
    </style>
</head>

<body>
    <h1>Settings</h1>
    <p>
        <a href="/usage/">助けてよ</a>
    </p>

    <div id="notifications">
        <h4>Notification</h4>
    </div>

    <section id="forms">
        <h3>Startup Script</h3>
        <form method="get" action="javascript:void(0)">
            <input name="setting" value="StartupLang" type="hidden">
            <label for="startup-lang">Startup script language</label>
            <select id="startup-lang" name="value" onchange="done(this.form)">
                <option value="javascript">javascript</option>
                <option value="aiol">aiol</option>
            </select>
        </form>

        <form method="get" action="javascript:void(0)" id="script-form">
            <input name="setting" value="UIStartupScript" type="hidden">
            <label for="startup-script">Startup script
                <textarea id="startup-script" onchange="done(this.form)" rows="40" cols="80" form="script-form"
                    name="value"></textarea>
            </label>
        </form>

        <h3>Many, Many Templates</h3>
    </section>
</body>

<script src="/ui/globals.js"></script>
<script src="/js/api.js"></script>
<script src="/ui/ui.js"></script>
<script src="/ui/components.js"></script>

<script>
    const urlData = new URLSearchParams(document.location.search)
    const uid = Number(urlData.get("uid") || prompt("uid"))

    const forms = document.getElementById("forms")

    function setupComponentForm(component, defaultTemplate = "") {
        let form = document.getElementById(`template-${component}`)
        if(form) {
            form.querySelector(`[name="value"]`).value = defaultTemplate
            return
        } else {
            form = document.createElement("form")
        }
        form.method = "POST"
        form.id = `template-${component}`
        form.action = "javascript:void(0)"

        const label = document.createElement("label")
        label.innerHTML  = `Template for <code>${component}</code>`
        const te = document.createElement("textarea")
        const settingIn = document.createElement("input")
        settingIn.name = "setting"
        settingIn.value = `template-${component}`
        settingIn.type = 'hidden'
        te.name = "value"
        if(defaultTemplate == "") {
            fetch(`${location.protocol}//${location.host}/ui/html-templates/${component}.html`).then(res => res.text())
            .then(text => {
                const p = new DOMParser
                const d = p.parseFromString(text, "text/html")
                te.value = d.querySelector("template").innerHTML
            })
        } else {
            te.value = defaultTemplate
        }
        te.onchange = function() {
            done(this.form)
        }
        te.rows="40"
        te.cols="80"
        label.append(te)
        form.append(settingIn, label)

        const del = document.createElement("button")
        del.onclick = function() {
            if(!confirm(`Are you sure you want to delete your customized ${component}`)) return
            fetch(`/settings/delete/?uid=${uid}&setting=template-${component}`,{
                method: "DELETE"
            }).then(res => {
                if(res.status !== 200) return
                alert(`${component} setting deleted, reset to default`)
            })
        }
        del.innerText = `🗑 ${component}`

        forms.append(form, del)
    }
    for(let component of component_templates.concat(["display-entry"])) {
        setupComponentForm(component)
    }

    fetch(`${location.protocol}//${location.host}/settings/get?uid=${uid}`)
        .then(res => {
            if(res.status === 401) {
                alert("You are not logged in, redirecting to login page")
                location = `/login?location=/settings.html?uid=${uid}`
                return
            }
            return res.json()
        })
        .then(settings => {
            window['startup-script'].value = settings["UIStartupScript"]
            window['startup-lang'].value = settings['StartupLang']

            for(let setting in settings) {
                if(setting.startsWith("template-")) {
                    setupComponentForm(setting.split("template-")[1], settings[setting])
                }
            }
        })

    function done(form) {
        const data = new FormData(form)
        const params = new URLSearchParams({setting: data.get("setting"), value: data.get("value")})
        authorizedRequest(`/settings/set?uid=${uid}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: params.toString()
        })
            .then(res => res.status === 200 ? alert("settings saved") : alert("failed to save settings"))
    }

</script>

</html>
